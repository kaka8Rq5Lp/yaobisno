<!DOCTYPE html>
<html lang="pt">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin - Ya o bisno</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#f5f5f5;padding:20px;color:#333}
h1{font-size:24px;margin-bottom:20px}
nav{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
nav button{padding:10px 20px;border:none;border-radius:8px;background:#ddd;cursor:pointer;font-size:14px}
nav button.ativo{background:#e67e22;color:#fff}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.1)}
th,td{padding:10px 12px;text-align:left;font-size:13px;border-bottom:1px solid #eee}
th{background:#f8f8f8;font-weight:600;white-space:nowrap}
tr:hover{background:#fef9f4}
.msg{text-align:center;padding:40px;color:#999}
img.thumb{width:50px;height:50px;object-fit:cover;border-radius:4px}
.btn-del{background:#e74c3c;color:#fff;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px}
.btn-del:hover{background:#c0392b}
</style>
</head>
<body>
<h1>Painel Admin</h1>
<nav>
<button onclick="carregar('users',this)" class="ativo">Users</button>
<button onclick="carregar('products',this)">Produtos</button>
<button onclick="carregar('chats',this)">Chats</button>
<button onclick="carregar('cart',this)">Carrinho</button>
</nav>
<div id="conteudo"><div class="msg">A carregar...</div></div>

<script>
async function carregar(tipo, btn) {
  document.querySelectorAll('nav button').forEach(b => b.className='');
  btn.className='ativo';
  const div = document.getElementById('conteudo');
  div.innerHTML = '<div class="msg">A carregar...</div>';
  try {
    const r = await fetch('/api/admin/' + tipo);
    const dados = await r.json();
    if (!dados.length) { div.innerHTML = '<div class="msg">Nenhum registo encontrado</div>'; return; }
    let html = '<table><thead><tr>';
    for (const chave of Object.keys(dados[0])) html += '<th>' + chave + '</th>';
    if (tipo === 'users' || tipo === 'products') html += '<th>Acoes</th>';
    html += '</tr></thead><tbody>';
    for (const item of dados) {
      html += '<tr>';
      for (const [chave, val] of Object.entries(item)) {
        const v = String(val ?? '');
        if (typeof val === 'string' && val.startsWith('data:image')) html += '<td><img class="thumb" src="' + val + '"></td>';
        else html += '<td>' + v.substring(0, 100) + (v.length > 100 ? '...' : '') + '</td>';
      }
      if (tipo === 'users') html += '<td><button class="btn-del" onclick="eliminarUser(\'' + item.email + '\')">X</button></td>';
      if (tipo === 'products') html += '<td><button class="btn-del" onclick="eliminarProd(\'' + item.id + '\')">X</button></td>';
      html += '</tr>';
    }
    html += '</tbody></table>';
    div.innerHTML = html;
  } catch(e) { div.innerHTML = '<div class="msg">Erro ao carregar dados</div>'; }
}

async function eliminarUser(email) {
  if (!confirm('Eliminar user ' + email + ' e todos os seus dados?')) return;
  await fetch('/api/admin/user/' + encodeURIComponent(email), { method:'DELETE' });
  carregar('users', document.querySelector('nav button'));
}

async function eliminarProd(id) {
  if (!confirm('Eliminar produto #' + id + '?')) return;
  await fetch('/api/admin/product/' + id, { method:'DELETE' });
  carregar('products', document.querySelectorAll('nav button')[1]);
}

carregar('users');
</script>
</body>
</html>
